# Global MISE configuration

[env]

[settings]
# config files with these prefixes will be trusted by default
trusted_config_paths = ["~/Developer/"]
# https://mise.jdx.dev/mise-cookbook/python.html#mise-uv
python.uv_venv_auto = "source"

[tools]
usage = "latest"
# Python ecosystem
python = "latest"
uv = "latest"
# Golang ecosystem
go = "latest"
# JS/TS ecosystem
node = "latest"
bun = "latest"
# Rust ecosystem
rust = "latest"
# GitHub Actions linting
actionlint = "latest"
awscli = { version = "2", symlink_bins = "true" }
hk = "1.48.0"
pkl = "0.31.1"
swiftlint = "latest"
